repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
      - id: ruff-format
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: .venv/bin/python -m mypy .
        language: system
        pass_filenames: false
      - id: pyright
        name: pyright
        entry: .venv/bin/python -m pyright
        language: system
        pass_filenames: false
      - id: ty
        name: ty
        entry: .venv/bin/ty check
        language: system
        pass_filenames: false
      - id: interrogate
        name: interrogate
        entry: .venv/bin/interrogate .
        language: system
        pass_filenames: false
      - id: pydoclint
        name: pydoclint
        entry: .venv/bin/pydoclint api domain ingestion sources main.py
        language: system
        pass_filenames: false
      - id: pytest
        name: pytest with coverage
        entry: .venv/bin/python -m pytest --cov --cov-report=term-missing
        language: system
        pass_filenames: false
