repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
      - id: ruff-format
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: python -m mypy .
        language: system
        pass_filenames: false
      - id: pyright
        name: pyright
        entry: python -m pyright
        language: system
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: python -m pytest -q
        language: system
        pass_filenames: false
